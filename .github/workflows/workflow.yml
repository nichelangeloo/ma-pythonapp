name: CI
run-name: ${{ github.actor }} triggered the workflow

env:
  GITHUB_ACTIONS: True

on:
  pull_request:

jobs:
  github-task-job:
    runs-on: ubuntu-latest
    
    steps:
    - name: Show GITHUB_ACTIONS env variable
      run: echo ${{ env.GITHUB_ACTIONS }}
    - name: Show name of branch and repository
      run: echo "Branch - ${{ github.head_ref }}, Repository - ${{ github.repository }}"
    - name: Show event name that triggered workflow
      run: echo "Event - ${{ github.event_name }}"
